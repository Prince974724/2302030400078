<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Playlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>

<body class="bg-white text-gray-900">
    <div class="p-4">
        <div class="flex items-center mb-4"> <i class="fas fa-arrow-left text-xl"></i> </div>
        <h1 class="text-3xl font-bold mb-4">Happy Playlist</h1>
        <div class="flex space-x-4 mb-6">
            <div class="relative w-1/2"> <img src="https://c8.alamy.com/comp/M1DDY5/colourful-music-background-with-guitar-and-music-notes-M1DDY5.jpg"
                    alt="A DJ mixing music with vibrant lights in the background"
                    class="rounded-lg w-full h-full object-cover">
                <div class="absolute bottom-0 left-0 p-4 text-white">
                    <h2 class="text-lg font-bold">Sunny Vibes</h2>
                    <p class="text-sm">Feel-good tunes</p>
                </div>
            </div>
            <div class="relative w-1/2"> <img src="https://c8.alamy.com/comp/M1DDY5/colourful-music-background-with-guitar-and-music-notes-M1DDY5.jpg"
                    alt="A computer screen showing music software with colorful graphs and charts"
                    class="rounded-lg w-full h-full object-cover">
                <div class="absolute bottom-0 left-0 p-4 text-white">
                    <h2 class="text-lg font-bold">Joyful Beats</h2>
                    <p class="text-sm">Uplifting rhythms</p>
                </div>
            </div>
        </div>
        <h2 class="text-2xl font-bold mb-4">Recommended Artists</h2>
        <div class="space-y-4">
            <div class="flex items-center space-x-4"> <img src="https://c8.alamy.com/comp/M1DDY5/colourful-music-background-with-guitar-and-music-notes-M1DDY5.jpg"
                    alt="Portrait of John Smith" class="w-12 h-12 rounded-full object-cover">
                <div>
                    <h3 class="text-lg font-bold">John Smith</h3>
                    <p class="text-sm text-gray-500">Accountant</p>
                </div>
            </div>
            <div class="flex items-center space-x-4"> <img src="https://c8.alamy.com/comp/M1DDY5/colourful-music-background-with-guitar-and-music-notes-M1DDY5.jpg" alt="Portrait of Jane Doe"
                    class="w-12 h-12 rounded-full object-cover">
                <div>
                    <h3 class="text-lg font-bold">Jane Doe</h3>
                    <p class="text-sm text-gray-500">Musician</p>
                </div>
