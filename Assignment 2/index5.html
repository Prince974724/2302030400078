<html>

<head>
    <title>Sad Playlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>

<body class="bg-white text-gray-900">
    <div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-4">Sad Playlist</h1>
        <div class="flex space-x-4 mb-6">
            <div class="w-1/2"> <img src="https://i.pinimg.com/originals/86/b2/79/86b279738617f15c40e329b6180e7fa6.jpg"
                    alt="A person playing a piano in a dimly lit room" class="rounded-lg mb-2">
                <h2 class="text-lg font-semibold">Melancholy Vibes</h2>
                <p class="text-gray-500">Soft tunes for reflection</p>
            </div>
            <div class="w-1/2"> <img src="https://i.pinimg.com/originals/86/b2/79/86b279738617f15c40e329b6180e7fa6.jpg"
                    alt="A close-up of a feather with a soft, blurry background" class="rounded-lg mb-2">
                <h2 class="text-lg font-semibold">Tearful Melodies</h2>
                <p class="text-gray-500">Songs to soothe the soul</p>
            </div>
        </div>
        <h2 class="text-2xl font-bold mb-4">Recommended Artists</h2>
        <div class="space-y-4">
            <div class="flex items-center"> <img src="https://i.pinimg.com/originals/86/b2/79/86b279738617f15c40e329b6180e7fa6.jpg" alt="Sheet music with notes"
                    class="rounded-full w-12 h-12 mr-4">
                <div>
                    <h3 class="text-lg font-semibold">Adele</h3>
                    <p class="text-gray-500">Emotional Ballads</p>
                </div>
            </div>
            <div class="flex items-center"> <img src="https://i.pinimg.com/originals/86/b2/79/86b279738617f15c40e329b6180e7fa6.jpg"
                    alt="A scenic landscape with a clear sky" class="rounded-full w-12 h-12 mr-4">
                <div>
                    <h3 class="text-lg font-semibold">Sam Smith</h3>
                    <p class="text-gray-500">Heartfelt Lyrics</p>
                </div>
            </div>
            <div class="flex items-center"> <img src="https://i.pinimg.com/originals/86/b2/79/86b279738617f15c40e329b6180e7fa6.jpg"
                    alt="A concert stage with purple lighting" class="rounded-full w-12 h-12 mr-4">
                <div>
                    <h3 class="text-lg font-semibold">Lana Del Rey</h3>
                    <p class="text-gray-500">Dreamy Tunes</p>
                </div>
            </div>
        </div>
    </div>
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200">
        <div class="flex justify-around p-2"> <a href="#" class="flex flex-col items-center text-blue-500"> <i
                    class="fas fa-home text-xl"></i> <span class="text-xs">Home</span> </a> <a href="#"
                class="flex flex-col items-center text-gray-500"> <i class="fas fa-search text-xl"></i> <span
                    class="text-xs">Search</span> </a> <a href="#" class="flex flex-col items-center text-gray-500"> <i
                    class="fas fa-bookmark text-xl"></i> <span class="text-xs">Saved</span> </a> </div>
    </div>
</body>

</html>
