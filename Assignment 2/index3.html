<html>

<head>
    <title>Relaxed Playlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>

<body class="bg-white text-gray-900">
    <div class="max-w-md mx-auto"> <!-- Header -->
        <div class="text-center py-4">
            <h1 class="text-2xl font-bold">Relaxed Playlist</h1>
        </div> <!-- Main Image -->
        <div class="relative"> <img src="https://th.bing.com/th/id/OIP.tUqMwCqG4JODFP9RPFpzgwHaNH?rs=1&pid=ImgDetMain" alt="A superhero in a red suit"
                class="w-full h-64 object-cover">
            <div class="absolute bottom-4 left-4 text-white">
                <h2 class="text-xl font-bold">Relaxed Vibes</h2>
                <p>Feel the calm</p>
            </div>
        </div> <!-- Featured Tracks -->
        <div class="px-4 py-4">
            <h3 class="text-lg font-semibold">Featured Tracks</h3>
            <div class="flex space-x-4 mt-2">
                <div class="w-1/2"> <img src="https://th.bing.com/th/id/OIP.tUqMwCqG4JODFP9RPFpzgwHaNH?rs=1&pid=ImgDetMain" alt="Close-up of a vinyl record player"
                        class="w-full h-32 object-cover rounded-lg">
                    <div class="mt-2">
                        <h4 class="text-sm font-semibold">Gentle Waves</h4>
                        <p class="text-xs text-gray-500">Ocean Sounds</p>
                    </div>
                </div>
                <div class="w-1/2"> <img src="https://th.bing.com/th/id/OIP.tUqMwCqG4JODFP9RPFpzgwHaNH?rs=1&pid=ImgDetMain" alt="A serene forest with autumn leaves"
                        class="w-full h-32 object-cover rounded-lg">
                    <div class="mt-2">
                        <h4 class="text-sm font-semibold">Whispering Pines</h4>
                        <p class="text-xs text-gray-500">Nature's Lullaby</p>
                    </div>
                </div>
            </div>
        </div> <!-- Recommended Artists -->
        <div class="px-4 py-4">
            <h3 class="text-lg font-semibold">Recommended Artists</h3>
            <div class="mt-2 space-y-4">
                <div class="flex items-center"> <img src="https://th.bing.com/th/id/OIP.tUqMwCqG4JODFP9RPFpzgwHaNH?rs=1&pid=ImgDetMain" alt="Portrait of Lana Del Rey"
                        class="w-12 h-12 rounded-full">
                    <div class="ml-4">
                        <h4 class="text-sm font-semibold">Lana Del Rey</h4>
                        <p class="text-xs text-gray-500">Dream Pop</p>
                    </div>
                </div>
                <div class="flex items-center"> <img src="https://th.bing.com/th/id/OIP.tUqMwCqG4JODFP9RPFpzgwHaNH?rs=1&pid=ImgDetMain" alt="Portrait of Enya"
                        class="w-12 h-12 rounded-full">
                    <div class="ml-4">
                        <h4 class="text-sm font-semibold">Enya</h4>
                        <p class="text-xs text-gray-500">New Age</p>
                    </div>
                </div>
                <div class="flex items-center"> <img src="https://th.bing.com/th/id/OIP.tUqMwCqG4JODFP9RPFpzgwHaNH?rs=1&pid=ImgDetMain" alt="Portrait of Norah Jones"
                        class="w-12 h-12 rounded-full">
                    <div class="ml-4">
                        <h4 class="text-sm font-semibold">Norah Jones</h4>
                        <p class="text-xs text-gray-500">Jazz</p>
                    </div>
                </div>
            </div>
        </div> <!-- Navigation -->
        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200">
            <div class="flex justify-around py-2"> <a href="#" class="text-blue-500 flex flex-col items-center"> <i
                        class="fas fa-home text-xl"></i> <span class="text-xs">Home</span> </a> <a href="#"
                    class="text-gray-500 flex flex-col items-center"> <i class="fas fa-search text-xl"></i> <span
                        class="text-xs">Search</span> </a> <a href="#" class="text-gray-500 flex flex-col items-center">
                    <i class="fas fa-bookmark text-xl"></i> <span class="text-xs">Saved</span> </a> </div>
        </div>
    </div>
</body>

</html>
