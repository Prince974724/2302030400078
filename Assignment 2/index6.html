<html>

<head>
    <title>Music App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>

<body class="bg-white text-gray-900">
    <div class="max-w-md mx-auto"> <!-- Header Image -->
        <div class="relative"> <img src="https://marketplace.canva.com/EAFSNmv0C0k/1/0/1600w/canva-orange-illustration-relaxing-playlist-cover-G1lOYn2PS28.jpg" alt="Close-up of a car with the Impala logo"
                class="w-full h-48 object-cover">
            <div class="absolute bottom-4 left-4">
                <h1 class="text-3xl font-bold text-white">Currents</h1>
                <p class="text-lg text-white">Tame Impala</p>
            </div>
        </div> <!-- Track List -->
        <div class="mt-6 px-4">
            <h2 class="text-xl font-semibold">Track List</h2>
            <div class="flex mt-4 space-x-4">
                <div class="w-1/2"> <img src="https://marketplace.canva.com/EAFSNmv0C0k/1/0/1600w/canva-orange-illustration-relaxing-playlist-cover-G1lOYn2PS28.jpg" alt="Colorful abstract art"
                        class="w-full h-32 object-cover rounded-lg">
                    <p class="mt-2 text-sm font-semibold">Let It Happen</p>
                    <p class="text-sm text-gray-500">7:47</p>
                </div>
                <div class="w-1/2"> <img src="https://marketplace.canva.com/EAFSNmv0C0k/1/0/1600w/canva-orange-illustration-relaxing-playlist-cover-G1lOYn2PS28.jpg" alt="Person holding a sign"
                        class="w-full h-32 object-cover rounded-lg">
                    <p class="mt-2 text-sm font-semibold">Nangs</p>
                    <p class="text-sm text-gray-500">1:48</p>
                </div>
            </div>
        </div> <!-- Recommended Artists -->
        <div class="mt-6 px-4">
            <h2 class="text-xl font-semibold">Recommended Artists</h2>
            <div class="flex justify-between mt-4">
                <div class="text-center"> <i class="fas fa-heart text-xl text-gray-500"></i>
                    <p class="mt-1 text-sm">Dua Lipa</p>
                </div>
                <div class="text-center"> <i class="fas fa-heart text-xl text-gray-500"></i>
                    <p class="mt-1 text-sm">Doja Cat</p>
                </div>
                <div class="text-center"> <i class="fas fa-heart text-xl text-gray-500"></i>
                    <p class="mt-1 text-sm">King Gizzard</p>
                </div>
                <div class="text-center"> <i class="fas fa-heart text-xl text-gray-500"></i>
                    <p class="mt-1 text-sm">Illusion</p>
                </div>
            </div>
        </div> <!-- Add to Saved Button -->
        <div class="mt-6 px-4"> <button
                class="w-full py-3 bg-purple-600 text-white text-lg font-semibold rounded-lg">Add to Saved</button>
        </div>
    </div>
</body>

</html>
